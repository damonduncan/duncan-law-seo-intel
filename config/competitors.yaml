# ─────────────────────────────────────────────────────────────────────────────
# Duncan Law — Competitor Configuration
#
# HOW TO ADD A COMPETITOR:
#   1. Add a new entry under `competitors:` with a unique `id`
#   2. Find the google_place_id using Google Maps (search the firm, click Share,
#      the Place ID is in the URL or use the Place ID Finder tool)
#   3. List all attorney names exactly as they appear in PACER (check a recent filing)
#   4. Add aliases for any name variations you've seen in PACER
#   5. Save the file and redeploy — the database syncs automatically on startup
# ─────────────────────────────────────────────────────────────────────────────

own_firm:
  name: "Duncan Law"
  domain: "duncanlawonline.com"
  bbb_url: ""                   # Optional: your BBB profile URL
  attorneys:
    - name: "Damon Duncan"
      aliases:
        - "D Duncan"
        - "Damon T Duncan"
        - "Damon Trevor Duncan"
  # One entry per office — each market has its own Google reviews and local pack ranking
  locations:
    - market: greensboro
      google_place_id: ""       # Find at: maps.google.com → search "Duncan Law Greensboro" → Share → copy Place ID
    - market: winston_salem
      google_place_id: ""
    - market: high_point
      google_place_id: ""
    - market: salisbury
      google_place_id: ""
    - market: charlotte
      google_place_id: ""
    - market: asheville
      google_place_id: ""

competitors:
  # ── EXAMPLE ENTRY (replace with real competitors) ──────────────────────────
  # - id: comp_001                          # Unique ID — never change this once set
  #   name: "Firm Display Name"
  #   google_place_id: ""                   # Required for review tracking
